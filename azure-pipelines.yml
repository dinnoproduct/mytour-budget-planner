# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- dev

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'b32c6576-d68f-49f6-80a7-cf4ce225ef99'
  imageRepository: 'mytourweb'
  containerRegistry: 'dinnomytour.azurecr.io'
  dockerfilePath: '**/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: 'test'

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployToVM
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: SSH@0
      inputs:
        sshEndpoint: 'TestVM-SSH'  # Use the SSH Service Connection Name
        runOptions: 'commands'
        commands: |  
          docker login dinnomytour.azurecr.io -u $(ACR_USERNAME) -p $(ACR_PASSWORD)        
          docker pull dinnomytour.azurecr.io/mytourweb:test
          docker stop mytour-web || true
          docker rm mytour-web || true
          docker run -d -p 3004:5173 --name mytour-web dinnomytour.azurecr.io/mytourweb:test
          docker system prune -f
        failOnStderr: true        
