<script src="/_next/static/chunks/react-refresh.js"></script><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"event":{"eventId":"b14cdf60-4c57-4594-8171-15d4342d2b84","sessionId":"b14cdf60-4c57-4594-8171-15d4342d2b84","eventName":"\"Долгий путь слонов\"","eventDescription":"\"Гаспаре Дори – известный современный итальянский драматург. Егопьесы отмечены престижными премиями. «Долг ий путь слонов» - это пьеса о том, как люди связаны друг с другом в этой жизни и, возможно, после нее.\u003cbr\u003eПьеса говорит об уважении, терпении понимании. Это психологическая драма, хотя ее можно назвать и детективом, и триллером. На сцене два разных эпизода, которые на первый взгляд кажутся не связанными, однако потом связь их становится очевидной.\u003cbr\u003eГерои и при жизни, и после смерти пытаются вырваться из западни, уготованной им не только жизнью, но и смертью. Один из героев, который любит слонов, говорит: «Слоны отличаются добротой и мудростью. Они прекрасно чувствуют себя и в коллективе, и в\r\nодиночестве. Это одно из самых социальных животных на земле.\u003cbr\u003eГруппа слонов не есть стадо, это нечто большее. Это как небольшое сообщество. А однажды они уходят, оставляя свою территорию. И никто не знает, куда они уходят. Никто не знает, почему они приняли такое решение. Никто не знает их цели».\u003cbr\u003eТаковы и люди.\u003cbr\u003e\u003cbr\u003eЦена билетов:3000др.\"","eventInfo":"Русский драматический театр имени К.С.Станиславского","eventCategory":"Театр","eventDateTime":"2024-11-20 19:00","venue":{"name":"Русский драматический театр имени К.С.Станиславского","address":"Ереван, ул. Абовяна 7","chartUrl":"https://venue.eventhub.am/event?id=UkFUWGhuTytYbmE0dG5oMmdtcGNZTEY5NHdQb2pGR3lDZ2ExS29tcjNlZnJUZkVrQ3c2YjYxYW1KOWhLTngwd0htbi96NXhVY0FmQUZrMUJNcTFJaWc9PQ\u0026lang=ru","geolocation":{"latitude":40.18217,"longitude":44.51655}},"imageUrl":"https://dinnoevent.blob.core.windows.net/images/b14cdf60-4c57-4594-8171-15d4342d2b84_1.png"}},"__
